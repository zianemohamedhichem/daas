<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blazerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#37474f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#263238;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5d4037;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3e2723;stop-opacity:1"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bgGrad)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="350" cy="60" r="30" fill="#4caf50" opacity="0.15"/>
  <circle cx="50" cy="440" r="20" fill="#4caf50" opacity="0.12"/>
  <circle cx="320" cy="400" r="15" fill="#81c784" opacity="0.2"/>

  <!-- Floating books (left side) -->
  <g transform="translate(30, 340)">
    <rect x="0" y="0" width="50" height="12" rx="2" fill="#e57373" opacity="0.8"/>
    <rect x="3" y="-8" width="45" height="12" rx="2" fill="#64b5f6" opacity="0.8"/>
    <rect x="1" y="-16" width="48" height="12" rx="2" fill="#ffb74d" opacity="0.8"/>
  </g>

  <!-- Apple (right side) -->
  <g transform="translate(330, 350)">
    <circle cx="15" cy="15" r="14" fill="#e53935"/>
    <circle cx="12" cy="12" r="13" fill="#ef5350"/>
    <ellipse cx="15" cy="8" rx="3" ry="2" fill="#c62828" opacity="0.3"/>
    <path d="M15 3 Q16 -2 20 0" stroke="#5d4037" stroke-width="1.5" fill="none"/>
    <ellipse cx="19" cy="-1" rx="4" ry="2.5" fill="#4caf50" transform="rotate(20,19,-1)"/>
  </g>

  <!-- Pencil (floating) -->
  <g transform="translate(340, 200) rotate(25)">
    <rect x="0" y="0" width="6" height="50" rx="1" fill="#fdd835"/>
    <rect x="0" y="0" width="6" height="8" rx="1" fill="#ffb74d"/>
    <polygon points="0,50 6,50 3,58" fill="#ffe0b2"/>
    <polygon points="1.5,56 4.5,56 3,61" fill="#37474f"/>
    <rect x="0" y="0" width="6" height="5" rx="1" fill="#e0e0e0"/>
  </g>

  <!-- Digital Board -->
  <g filter="url(#softShadow)">
    <rect x="220" y="100" width="150" height="100" rx="8" fill="url(#boardGrad)"/>
    <rect x="228" y="108" width="134" height="76" rx="4" fill="#4a6572"/>
    <!-- Screen content -->
    <text x="295" y="142" text-family="Poppins, sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle">Bonjour!</text>
    <text x="295" y="162" text-family="Poppins, sans-serif" font-size="9" fill="#a5d6a7" text-anchor="middle">Bienvenue en classe</text>
    <!-- Screen shine -->
    <rect x="228" y="108" width="134" height="20" rx="4" fill="#fff" opacity="0.05"/>
    <!-- Board stand -->
    <rect x="285" y="200" width="20" height="8" rx="2" fill="#455a64"/>
    <rect x="275" y="208" width="40" height="4" rx="2" fill="#546e7a"/>
  </g>

  <!-- Teacher Character -->
  <g filter="url(#softShadow)">
    <!-- Legs / Pants -->
    <rect x="155" y="330" width="30" height="80" rx="4" fill="#37474f"/>
    <rect x="195" y="330" width="30" height="80" rx="4" fill="#37474f"/>
    <!-- Shoes -->
    <ellipse cx="170" cy="412" rx="18" ry="8" fill="#263238"/>
    <ellipse cx="210" cy="412" rx="18" ry="8" fill="#263238"/>

    <!-- Body / Blazer -->
    <path d="M140 230 Q140 210 165 205 L215 205 Q240 210 240 230 L245 340 L135 340 Z" fill="url(#blazerGrad)" rx="8"/>
    <!-- Blazer lapels -->
    <path d="M175 205 L185 250 L195 205" fill="#f5f5f5" opacity="0.9"/>
    <!-- Blazer buttons -->
    <circle cx="190" cy="270" r="3" fill="#c8e6c9"/>
    <circle cx="190" cy="295" r="3" fill="#c8e6c9"/>
    <!-- Blazer pocket -->
    <rect x="155" y="260" width="22" height="2" rx="1" fill="#1b5e20" opacity="0.5"/>

    <!-- White Blouse collar -->
    <path d="M172 200 Q190 195 208 200 L200 220 L190 215 L180 220 Z" fill="#fff"/>

    <!-- Left Arm (gesturing toward board) -->
    <path d="M140 225 Q115 240 120 270 Q125 285 145 275" fill="url(#blazerGrad)"/>
    <ellipse cx="145" cy="272" rx="10" ry="8" fill="#ffcc80"/>
    <!-- Hand fingers -->
    <path d="M150 268 Q158 262 155 258" stroke="#ffcc80" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M152 272 Q162 268 160 262" stroke="#ffcc80" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Right Arm -->
    <path d="M240 225 Q265 240 260 280 Q255 300 240 310" fill="url(#blazerGrad)"/>
    <ellipse cx="240" cy="312" rx="10" ry="8" fill="#ffcc80"/>

    <!-- Neck -->
    <rect x="180" y="185" width="20" height="25" rx="4" fill="#ffcc80"/>

    <!-- Head -->
    <ellipse cx="190" cy="165" rx="40" ry="45" fill="#ffcc80"/>

    <!-- Hair back -->
    <ellipse cx="190" cy="145" rx="42" ry="38" fill="url(#hairGrad)"/>

    <!-- Hair bun -->
    <circle cx="190" cy="100" r="20" fill="url(#hairGrad)"/>
    <circle cx="190" cy="98" r="17" fill="#4e342e"/>
    <!-- Hair tie -->
    <circle cx="190" cy="112" r="3" fill="#e0e0e0"/>

    <!-- Face features -->
    <!-- Eyes -->
    <ellipse cx="176" cy="160" rx="4" ry="4.5" fill="#3e2723"/>
    <ellipse cx="204" cy="160" rx="4" ry="4.5" fill="#3e2723"/>
    <circle cx="177.5" cy="158.5" r="1.5" fill="#fff"/>
    <circle cx="205.5" cy="158.5" r="1.5" fill="#fff"/>

    <!-- Eyebrows -->
    <path d="M168 150 Q176 146 184 150" stroke="#3e2723" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M196 150 Q204 146 212 150" stroke="#3e2723" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M188 167 Q190 172 192 167" stroke="#e0a060" stroke-width="1.5" fill="none"/>

    <!-- Smile -->
    <path d="M178 178 Q190 190 202 178" stroke="#c62828" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="170" cy="175" rx="8" ry="4" fill="#ffab91" opacity="0.4"/>
    <ellipse cx="210" cy="175" rx="8" ry="4" fill="#ffab91" opacity="0.4"/>

    <!-- Earrings -->
    <circle cx="150" cy="170" r="2.5" fill="#ffd54f"/>
    <circle cx="230" cy="170" r="2.5" fill="#ffd54f"/>
  </g>

  <!-- Decorative elements -->
  <!-- Floating plus signs -->
  <g opacity="0.25" fill="#2e7d32">
    <rect x="55" y="120" width="10" height="3" rx="1.5"/>
    <rect x="59.5" y="115.5" width="3" height="10" rx="1.5"/>
  </g>
  <g opacity="0.2" fill="#2e7d32">
    <rect x="340" y="300" width="8" height="2.5" rx="1"/>
    <rect x="343" y="297" width="2.5" height="8" rx="1"/>
  </g>

  <!-- Small decorative dots -->
  <circle cx="70" cy="80" r="3" fill="#81c784" opacity="0.3"/>
  <circle cx="100" cy="420" r="2" fill="#66bb6a" opacity="0.25"/>
  <circle cx="310" cy="460" r="3.5" fill="#a5d6a7" opacity="0.3"/>
</svg>
