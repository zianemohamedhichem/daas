    <rect x="24" y="8" width="10" height="1.5" rx="0.5" fill="#FFFFFF" opacity="0.6"/>
    <rect x="24" y="12" width="7" height="1.5" rx="0.5" fill="#FFFFFF" opacity="0.4"/>
