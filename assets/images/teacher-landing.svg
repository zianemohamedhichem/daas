  <ellipse cx="145" cy="188" rx="6" ry="5" fill="#FFFFFF"/>
  <ellipse cx="175" cy="188" rx="6" ry="5" fill="#FFFFFF"/>
  <circle cx="146" cy="188" r="3.5" fill="#3E2723"/>
