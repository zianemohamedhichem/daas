  <!-- Smile -->
  <path d="M148 202 Q160 212 172 202" stroke="#C4845A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="135" cy="200" rx="6" ry="3.5" fill="#F0A07A" opacity="0.35"/>
  <ellipse cx="185" cy="200" rx="6" ry="3.5" fill="#F0A07A" opacity="0.35"/>

  <!-- Blazer shoulders on top -->
  <path d="M135 228 Q140 218 155 240 L135 245Z" fill="#0F766E" opacity="0.6"/>
  <path d="M185 228 Q180 218 165 240 L185 245Z" fill="#0F766E" opacity="0.6"/>
