<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow4" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="appleShadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad4)" rx="12"/>

  <!-- Decorative shapes -->
  <circle cx="365" cy="35" r="22" fill="#ff9800" opacity="0.1"/>
  <circle cx="35" cy="265" r="16" fill="#ffb74d" opacity="0.12"/>
  <circle cx="200" cy="25" r="10" fill="#ffcc80" opacity="0.15"/>

  <!-- === Book Stack === -->
  <g filter="url(#shadow4)" transform="translate(120, 30)">

    <!-- Book 1 (bottom) - Dark blue -->
    <g>
      <rect x="0" y="190" width="160" height="32" rx="4" fill="#1565c0"/>
      <rect x="0" y="190" width="160" height="32" rx="4" fill="#1976d2" opacity="0.5"/>
      <!-- Book spine shadow -->
      <rect x="0" y="190" width="8" height="32" rx="4" fill="#0d47a1"/>
      <!-- Book pages edge -->
      <rect x="8" y="192" width="148" height="28" rx="2" fill="#e3f2fd" opacity="0.15"/>
      <!-- Title line -->
      <rect x="20" y="200" width="80" height="4" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="20" y="208" width="50" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
      <!-- Decorative line -->
      <rect x="20" y="214" width="120" height="1" rx="0.5" fill="#fff" opacity="0.15"/>
    </g>

    <!-- Book 2 - Emerald green -->
    <g>
      <rect x="5" y="155" width="150" height="32" rx="4" fill="#2e7d32"/>
      <rect x="5" y="155" width="150" height="32" rx="4" fill="#43a047" opacity="0.4"/>
      <!-- Spine -->
      <rect x="5" y="155" width="8" height="32" rx="4" fill="#1b5e20"/>
      <!-- Pages -->
      <rect x="13" y="157" width="138" height="28" rx="2" fill="#e8f5e9" opacity="0.15"/>
      <!-- Title -->
      <rect x="25" y="165" width="70" height="4" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="25" y="173" width="45" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
      <!-- Decorative diamond -->
      <polygon points="130,171 134,167 138,171 134,175" fill="#fff" opacity="0.2"/>
    </g>

    <!-- Book 3 - Warm orange -->
    <g>
      <rect x="10" y="120" width="145" height="32" rx="4" fill="#e65100"/>
      <rect x="10" y="120" width="145" height="32" rx="4" fill="#f57c00" opacity="0.4"/>
      <!-- Spine -->
      <rect x="10" y="120" width="8" height="32" rx="4" fill="#bf360c"/>
      <!-- Pages -->
      <rect x="18" y="122" width="133" height="28" rx="2" fill="#fff3e0" opacity="0.15"/>
      <!-- Title -->
      <rect x="30" y="130" width="60" height="4" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="30" y="138" width="40" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
      <!-- Decorative circle -->
      <circle cx="138" cy="136" r="5" fill="#fff" opacity="0.15"/>
    </g>

    <!-- Book 4 - Purple -->
    <g>
      <rect x="15" y="85" width="140" height="32" rx="4" fill="#6a1b9a"/>
      <rect x="15" y="85" width="140" height="32" rx="4" fill="#8e24aa" opacity="0.4"/>
      <!-- Spine -->
      <rect x="15" y="85" width="8" height="32" rx="4" fill="#4a148c"/>
      <!-- Pages -->
      <rect x="23" y="87" width="128" height="28" rx="2" fill="#f3e5f5" opacity="0.15"/>
      <!-- Title -->
      <rect x="35" y="95" width="55" height="4" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="35" y="103" width="35" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
    </g>

    <!-- Book 5 (top) - Red -->
    <g>
      <rect x="20" y="50" width="135" height="32" rx="4" fill="#c62828"/>
      <rect x="20" y="50" width="135" height="32" rx="4" fill="#e53935" opacity="0.4"/>
      <!-- Spine -->
      <rect x="20" y="50" width="8" height="32" rx="4" fill="#b71c1c"/>
      <!-- Pages -->
      <rect x="28" y="52" width="123" height="28" rx="2" fill="#ffebee" opacity="0.15"/>
      <!-- Title -->
      <rect x="40" y="60" width="65" height="4" rx="2" fill="#fff" opacity="0.3"/>
      <rect x="40" y="68" width="42" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
    </g>
  </g>

  <!-- Apple on top of books -->
  <g filter="url(#appleShadow)" transform="translate(175, 12)">
    <!-- Apple body -->
    <ellipse cx="25" cy="30" rx="22" ry="24" fill="#e53935"/>
    <ellipse cx="22" cy="28" rx="20" ry="22" fill="#ef5350"/>
    <!-- Apple indent at top -->
    <ellipse cx="25" cy="12" rx="6" ry="3" fill="#c62828" opacity="0.4"/>
    <!-- Stem -->
    <path d="M25 10 Q26 2 30 0" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <ellipse cx="33" cy="2" rx="8" ry="4" fill="#4caf50" transform="rotate(25,33,2)"/>
    <path d="M28 2 Q33 2 38 2" stroke="#388e3c" stroke-width="0.8" fill="none" opacity="0.5"/>
    <!-- Shine -->
    <ellipse cx="16" cy="22" rx="5" ry="7" fill="#fff" opacity="0.15"/>
    <ellipse cx="14" cy="18" rx="2" ry="3" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Glasses (beside books, right side) -->
  <g transform="translate(310, 170)">
    <!-- Left lens -->
    <circle cx="20" cy="20" r="16" stroke="#455a64" stroke-width="3" fill="none"/>
    <circle cx="20" cy="20" r="16" fill="#e3f2fd" opacity="0.2"/>
    <!-- Right lens -->
    <circle cx="60" cy="20" r="16" stroke="#455a64" stroke-width="3" fill="none"/>
    <circle cx="60" cy="20" r="16" fill="#e3f2fd" opacity="0.2"/>
    <!-- Bridge -->
    <path d="M36 18 Q40 12 44 18" stroke="#455a64" stroke-width="3" fill="none"/>
    <!-- Left temple -->
    <path d="M4 18 Q-10 15 -15 25" stroke="#455a64" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right temple -->
    <path d="M76 18 Q90 15 95 25" stroke="#455a64" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Lens shine -->
    <ellipse cx="14" cy="14" rx="4" ry="5" fill="#fff" opacity="0.15"/>
    <ellipse cx="54" cy="14" rx="4" ry="5" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Decorative floating elements -->
  <!-- Small book icon -->
  <g transform="translate(50, 80)" opacity="0.25">
    <rect x="0" y="0" width="20" height="16" rx="2" fill="#ff9800"/>
    <rect x="1" y="1" width="18" height="2" rx="1" fill="#fff" opacity="0.4"/>
    <line x1="10" y1="0" x2="10" y2="16" stroke="#e65100" stroke-width="1"/>
  </g>

  <!-- Pencil -->
  <g transform="translate(60, 200) rotate(-15)" opacity="0.3">
    <rect x="0" y="0" width="5" height="40" rx="1" fill="#fdd835"/>
    <rect x="0" y="0" width="5" height="8" rx="1" fill="#ffb74d"/>
    <polygon points="0,40 5,40 2.5,48" fill="#ffe0b2"/>
    <polygon points="1.5,46 3.5,46 2.5,50" fill="#37474f"/>
  </g>

  <!-- Floating star -->
  <g fill="#ffd54f" opacity="0.3" transform="translate(340, 60)">
    <polygon points="10,0 12.5,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 7.5,7"/>
  </g>

  <!-- Dots -->
  <circle cx="90" cy="50" r="3" fill="#ff9800" opacity="0.2"/>
  <circle cx="350" cy="250" r="2.5" fill="#ffb74d" opacity="0.2"/>
  <circle cx="70" cy="250" r="2" fill="#ffcc80" opacity="0.25"/>
</svg>
