<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8d6e63;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6d4c41;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad2)" rx="12"/>

  <!-- Decorative shapes -->
  <circle cx="370" cy="30" r="25" fill="#42a5f5" opacity="0.12"/>
  <circle cx="30" cy="270" r="18" fill="#42a5f5" opacity="0.1"/>
  <circle cx="200" cy="20" r="12" fill="#90caf9" opacity="0.15"/>
  <rect x="350" y="240" width="30" height="30" rx="4" fill="#42a5f5" opacity="0.08" transform="rotate(15,365,255)"/>

  <!-- Floor line -->
  <rect x="20" y="265" width="360" height="2" rx="1" fill="#90caf9" opacity="0.3"/>

  <!-- === Student 1 (left) - Girl with hijab === -->
  <g filter="url(#shadow2)">
    <!-- Chair -->
    <rect x="42" y="210" width="36" height="4" rx="2" fill="#78909c"/>
    <rect x="44" y="214" width="4" height="50" rx="1" fill="#78909c"/>
    <rect x="72" y="214" width="4" height="50" rx="1" fill="#78909c"/>

    <!-- Desk -->
    <rect x="30" y="195" width="60" height="6" rx="2" fill="url(#deskGrad)"/>
    <rect x="35" y="201" width="4" height="64" rx="1" fill="#6d4c41"/>
    <rect x="81" y="201" width="4" height="64" rx="1" fill="#6d4c41"/>

    <!-- Body -->
    <rect x="48" y="155" width="24" height="55" rx="6" fill="#7b1fa2"/>
    <!-- Arms -->
    <rect x="38" y="160" width="12" height="35" rx="5" fill="#7b1fa2"/>
    <rect x="70" y="160" width="12" height="35" rx="5" fill="#7b1fa2"/>
    <!-- Hands on desk -->
    <ellipse cx="44" cy="196" rx="6" ry="4" fill="#8d6e63"/>
    <ellipse cx="76" cy="196" rx="6" ry="4" fill="#8d6e63"/>

    <!-- Head -->
    <circle cx="60" cy="130" r="22" fill="#8d6e63"/>
    <!-- Hijab -->
    <path d="M38 125 Q38 100 60 95 Q82 100 82 125 L82 145 Q82 155 72 158 L48 158 Q38 155 38 145 Z" fill="#ce93d8"/>
    <path d="M42 128 Q42 105 60 100 Q78 105 78 128" fill="#ba68c8" opacity="0.4"/>
    <!-- Face -->
    <circle cx="52" cy="132" r="2.5" fill="#3e2723"/>
    <circle cx="68" cy="132" r="2.5" fill="#3e2723"/>
    <circle cx="53" cy="131" r="1" fill="#fff"/>
    <circle cx="69" cy="131" r="1" fill="#fff"/>
    <path d="M55 140 Q60 145 65 140" stroke="#c62828" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Book on desk -->
    <rect x="40" y="188" width="18" height="4" rx="1" fill="#ef5350"/>
    <rect x="42" y="185" width="14" height="4" rx="1" fill="#42a5f5"/>
  </g>

  <!-- === Student 2 (center-left) - Boy === -->
  <g filter="url(#shadow2)">
    <!-- Chair -->
    <rect x="132" y="210" width="36" height="4" rx="2" fill="#78909c"/>
    <rect x="134" y="214" width="4" height="50" rx="1" fill="#78909c"/>
    <rect x="162" y="214" width="4" height="50" rx="1" fill="#78909c"/>

    <!-- Desk -->
    <rect x="120" y="195" width="60" height="6" rx="2" fill="url(#deskGrad)"/>
    <rect x="125" y="201" width="4" height="64" rx="1" fill="#6d4c41"/>
    <rect x="171" y="201" width="4" height="64" rx="1" fill="#6d4c41"/>

    <!-- Body -->
    <rect x="138" y="155" width="24" height="55" rx="6" fill="#1565c0"/>
    <!-- Arms -->
    <rect x="128" y="160" width="12" height="35" rx="5" fill="#1565c0"/>
    <rect x="160" y="160" width="12" height="35" rx="5" fill="#1565c0"/>
    <!-- Hands -->
    <ellipse cx="134" cy="196" rx="6" ry="4" fill="#6d4c41"/>
    <ellipse cx="166" cy="196" rx="6" ry="4" fill="#6d4c41"/>

    <!-- Head -->
    <circle cx="150" cy="130" r="22" fill="#6d4c41"/>
    <!-- Hair -->
    <path d="M128 122 Q128 102 150 98 Q172 102 172 122" fill="#3e2723"/>
    <!-- Face -->
    <circle cx="142" cy="132" r="2.5" fill="#3e2723"/>
    <circle cx="158" cy="132" r="2.5" fill="#3e2723"/>
    <circle cx="143" cy="131" r="1" fill="#fff"/>
    <circle cx="159" cy="131" r="1" fill="#fff"/>
    <path d="M145 140 Q150 144 155 140" stroke="#c62828" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Pencil in hand -->
    <rect x="162" y="183" width="3" height="20" rx="1" fill="#fdd835" transform="rotate(-10,163,193)"/>
    <polygon points="162,203 165,203 163.5,208" fill="#ffe0b2" transform="rotate(-10,163,205)"/>
  </g>

  <!-- === Student 3 (center-right) - Girl === -->
  <g filter="url(#shadow2)">
    <!-- Chair -->
    <rect x="222" y="210" width="36" height="4" rx="2" fill="#78909c"/>
    <rect x="224" y="214" width="4" height="50" rx="1" fill="#78909c"/>
    <rect x="252" y="214" width="4" height="50" rx="1" fill="#78909c"/>

    <!-- Desk -->
    <rect x="210" y="195" width="60" height="6" rx="2" fill="url(#deskGrad)"/>
    <rect x="215" y="201" width="4" height="64" rx="1" fill="#6d4c41"/>
    <rect x="261" y="201" width="4" height="64" rx="1" fill="#6d4c41"/>

    <!-- Body -->
    <rect x="228" y="155" width="24" height="55" rx="6" fill="#00897b"/>
    <!-- Arms -->
    <rect x="218" y="160" width="12" height="35" rx="5" fill="#00897b"/>
    <rect x="250" y="160" width="12" height="35" rx="5" fill="#00897b"/>
    <!-- Hands -->
    <ellipse cx="224" cy="196" rx="6" ry="4" fill="#a1887f"/>
    <ellipse cx="256" cy="196" rx="6" ry="4" fill="#a1887f"/>

    <!-- Head -->
    <circle cx="240" cy="130" r="22" fill="#a1887f"/>
    <!-- Hair -->
    <path d="M218 122 Q218 100 240 95 Q262 100 262 122 L262 135 Q262 140 255 140 L225 140 Q218 140 218 135 Z" fill="#4e342e"/>
    <!-- Hair details -->
    <path d="M222 115 Q230 108 240 110" stroke="#3e2723" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- Face -->
    <circle cx="232" cy="132" r="2.5" fill="#3e2723"/>
    <circle cx="248" cy="132" r="2.5" fill="#3e2723"/>
    <circle cx="233" cy="131" r="1" fill="#fff"/>
    <circle cx="249" cy="131" r="1" fill="#fff"/>
    <path d="M235 140 Q240 145 245 140" stroke="#c62828" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Hair clip -->
    <circle cx="255" cy="118" r="3" fill="#ff7043"/>
    <!-- Notebook on desk -->
    <rect x="220" y="186" width="22" height="16" rx="2" fill="#fff"/>
    <rect x="220" y="186" width="22" height="3" rx="1" fill="#66bb6a"/>
    <line x1="224" y1="193" x2="238" y2="193" stroke="#bdbdbd" stroke-width="0.8"/>
    <line x1="224" y1="196" x2="235" y2="196" stroke="#bdbdbd" stroke-width="0.8"/>
  </g>

  <!-- === Student 4 (right) - Boy === -->
  <g filter="url(#shadow2)">
    <!-- Chair -->
    <rect x="312" y="210" width="36" height="4" rx="2" fill="#78909c"/>
    <rect x="314" y="214" width="4" height="50" rx="1" fill="#78909c"/>
    <rect x="342" y="214" width="4" height="50" rx="1" fill="#78909c"/>

    <!-- Desk -->
    <rect x="300" y="195" width="60" height="6" rx="2" fill="url(#deskGrad)"/>
    <rect x="305" y="201" width="4" height="64" rx="1" fill="#6d4c41"/>
    <rect x="351" y="201" width="4" height="64" rx="1" fill="#6d4c41"/>

    <!-- Body -->
    <rect x="318" y="155" width="24" height="55" rx="6" fill="#e65100"/>
    <!-- Arms -->
    <rect x="308" y="160" width="12" height="35" rx="5" fill="#e65100"/>
    <rect x="340" y="160" width="12" height="35" rx="5" fill="#e65100"/>
    <!-- Hands -->
    <ellipse cx="314" cy="196" rx="6" ry="4" fill="#6d4c41"/>
    <ellipse cx="346" cy="196" rx="6" ry="4" fill="#6d4c41"/>

    <!-- Head -->
    <circle cx="330" cy="130" r="22" fill="#6d4c41"/>
    <!-- Hair -->
    <path d="M308 122 Q308 102 330 98 Q352 102 352 122" fill="#212121"/>
    <!-- Face -->
    <circle cx="322" cy="132" r="2.5" fill="#3e2723"/>
    <circle cx="338" cy="132" r="2.5" fill="#3e2723"/>
    <circle cx="323" cy="131" r="1" fill="#fff"/>
    <circle cx="339" cy="131" r="1" fill="#fff"/>
    <path d="M325 140 Q330 144 335 140" stroke="#c62828" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Glasses -->
    <circle cx="322" cy="130" r="7" stroke="#455a64" stroke-width="1.5" fill="none"/>
    <circle cx="338" cy="130" r="7" stroke="#455a64" stroke-width="1.5" fill="none"/>
    <line x1="329" y1="130" x2="331" y2="130" stroke="#455a64" stroke-width="1.5"/>
    <!-- Book on desk -->
    <rect x="310" y="186" width="20" height="14" rx="2" fill="#fff59d"/>
    <rect x="310" y="186" width="20" height="3" rx="1" fill="#ff8a65"/>
  </g>

  <!-- Floating decorative elements -->
  <!-- Stars -->
  <g fill="#ffd54f" opacity="0.4">
    <polygon points="190,40 192,46 198,46 193,50 195,56 190,52 185,56 187,50 182,46 188,46"/>
  </g>
  <g fill="#42a5f5" opacity="0.3">
    <polygon points="80,60 81.5,64 86,64 82.5,67 83.5,71 80,68.5 76.5,71 77.5,67 74,64 78.5,64"/>
  </g>
  <g fill="#66bb6a" opacity="0.3">
    <polygon points="330,50 331.5,54 336,54 332.5,57 333.5,61 330,58.5 326.5,61 327.5,57 324,54 328.5,54"/>
  </g>

  <!-- Floating book -->
  <g transform="translate(360, 80) rotate(15)" opacity="0.35">
    <rect x="0" y="0" width="25" height="18" rx="2" fill="#ef5350"/>
    <rect x="1" y="1" width="23" height="2" rx="1" fill="#ffcdd2"/>
  </g>

  <!-- Floating pencil -->
  <g transform="translate(20, 50) rotate(-30)" opacity="0.3">
    <rect x="0" y="0" width="4" height="30" rx="1" fill="#fdd835"/>
    <polygon points="0,30 4,30 2,36" fill="#ffe0b2"/>
  </g>
</svg>
