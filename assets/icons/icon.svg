<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect x="0" y="0" width="192" height="192" rx="32" ry="32" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <circle cx="160" cy="32" r="40" fill="rgba(255,255,255,0.05)"/>
  <circle cx="32" cy="160" r="50" fill="rgba(255,255,255,0.05)"/>

  <!-- Clipboard body -->
  <rect x="58" y="36" width="76" height="110" rx="6" ry="6" fill="white" opacity="0.95"/>

  <!-- Clipboard top clip -->
  <rect x="72" y="28" width="48" height="20" rx="4" ry="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <circle cx="96" cy="38" r="4" fill="#1565C0"/>

  <!-- Checkmark lines (attendance rows) -->
  <!-- Row 1 -->
  <rect x="68" y="56" width="10" height="10" rx="2" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <polyline points="69,61 72,64 77,57" fill="none" stroke="#2E7D32" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="82" y="58" width="44" height="5" rx="2" fill="#E0E0E0"/>

  <!-- Row 2 -->
  <rect x="68" y="72" width="10" height="10" rx="2" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <line x1="70" y1="74" x2="76" y2="80" stroke="#C62828" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="76" y1="74" x2="70" y2="80" stroke="#C62828" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="82" y="74" width="44" height="5" rx="2" fill="#E0E0E0"/>

  <!-- Row 3 -->
  <rect x="68" y="88" width="10" height="10" rx="2" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <polyline points="69,93 72,96 77,89" fill="none" stroke="#2E7D32" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="82" y="90" width="44" height="5" rx="2" fill="#E0E0E0"/>

  <!-- Row 4 -->
  <rect x="68" y="104" width="10" height="10" rx="2" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <polyline points="69,109 72,112 77,105" fill="none" stroke="#2E7D32" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="82" y="106" width="44" height="5" rx="2" fill="#E0E0E0"/>

  <!-- Row 5 -->
  <rect x="68" y="120" width="10" height="10" rx="2" fill="#FFF8E1" stroke="#F57F17" stroke-width="1"/>
  <text x="73" y="129" text-anchor="middle" font-size="8" font-weight="bold" fill="#F57F17" font-family="sans-serif">R</text>
  <rect x="82" y="122" width="44" height="5" rx="2" fill="#E0E0E0"/>

  <!-- Bottom accent bar -->
  <rect x="58" y="146" width="76" height="4" rx="2" fill="url(#accent)"/>

  <!-- Percentage badge -->
  <circle cx="148" cy="140" r="22" fill="white" opacity="0.95"/>
  <circle cx="148" cy="140" r="19" fill="#2E7D32"/>
  <text x="148" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="sans-serif">92%</text>
</svg>
